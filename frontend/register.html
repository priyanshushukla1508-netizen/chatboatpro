<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ChatBotPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF;
            --bg: #0D0E1C;
            --surface: #161728;
            --text: #FFFFFF;
            --text-muted: #B0B3C6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .register-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .error {
            color: #FF4D4D;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="register-card">
        <h2>Start Your Free Trial</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Register</button>
            <p class="error" id="error-msg">Registration failed. Email might already exist.</p>
        </form>
        <div class="footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        const API_BASE = "https://chatboatpro1.onrender.com/api/v1/auth";
        const form = document.getElementById('register-form');
        const errorMsg = document.getElementById('error-msg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;

            try {
                const response = await fetch(API_BASE + "/register", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({
                        email: data.email,
                        fullName: data.fullName,
                        role: 'USER'
                    }));
                    window.location.href = "dashboard.html";
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    errorMsg.textContent = errorData.message || "Registration failed. Email might already exist.";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                console.error("Registration error:", err);
                errorMsg.textContent = "Server connection failed. Is the backend running?";
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>

</html>
